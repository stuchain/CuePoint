name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.
        
        **For crashes or complex issues:** Attach a support bundle for faster resolution.
        - GUI: Help → Support & Diagnostics → Export Support Bundle
        - CLI: `cuepoint --export-support-bundle`
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true
  
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots
      placeholder: Drag and drop screenshots here
  
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  
  - type: input
    id: version
    attributes:
      label: CuePoint Version
      placeholder: e.g., 1.0.0
    validations:
      required: true
  
  - type: input
    id: run_id
    attributes:
      label: Run ID (if applicable)
      description: Run ID from logs or CLI output (helps link logs to your report)
      placeholder: e.g., abc123-def456
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output or attach support bundle
      placeholder: |
        If you have a support bundle, attach it. Otherwise paste relevant log lines (especially ERROR/CRITICAL).
        Log location: Help → Open Logs Folder (GUI) or see "Logs:" at end of CLI run.
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context about the bug

