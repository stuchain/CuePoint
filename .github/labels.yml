# GitHub Labels for Step 13 Triage Workflow
# Use with label-sync action or apply manually
# https://github.com/marketplace/actions/label-sync

- name: "priority:P0"
  color: "b60205"
  description: "Critical - crash, data loss, security. 24h response."
- name: "priority:P1"
  color: "d93f0b"
  description: "Major - core feature broken. 48h response."
- name: "priority:P2"
  color: "fbca04"
  description: "Minor - workaround exists. 5 day response."
- name: "category:crash"
  color: "b60205"
  description: "App crash or unhandled exception"
- name: "category:update"
  color: "0052cc"
  description: "Update/install failure"
- name: "category:matching"
  color: "0e8a16"
  description: "Matching quality - wrong or missing matches"
- name: "category:performance"
  color: "c2e0c6"
  description: "Slow runs, high memory"
- name: "category:ui"
  color: "c5def5"
  description: "UI, layout, accessibility"
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "question"
  color: "d876e3"
  description: "Support question"
- name: "security"
  color: "ee0701"
  description: "Security vulnerability"
