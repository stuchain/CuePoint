<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CuePoint – Download</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #e6edf3;
      background: #0d1117;
      margin: 0;
      padding: 1rem 0.75rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    main {
      max-width: 520px;
      width: 100%;
      text-align: center;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.25rem 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 .5rem;
    }
    p {
      margin: 0 0 1.5rem;
      color: #8b949e;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 0;
      padding-bottom: 0;
      display: block;
    }
    a.download {
      display: block;
      flex: 1 1 0;
      min-width: 0;
      text-align: center;
      background: #0969da;
      color: #fff !important;
      text-decoration: none;
      font-weight: 600;
      padding: .6rem 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background .15s;
    }
    a.download:hover {
      background: #388bfd;
    }
    .downloads {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: stretch;
      justify-content: center;
    }
    a.releases {
      display: inline-block;
      margin-top: 1rem;
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.875rem;
    }
    a.releases:hover { color: #79c0ff; text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="logo.png" alt="CuePoint" width="120" height="120">
    <p>Accurate music metadata for Rekordbox libraries.</p>
    <div class="downloads">
      <a class="download" id="win-dl" href="#">Download latest Windows release</a>
      <a class="download" id="mac-dl" href="#">Download latest macOS release</a>
    </div>
    <a class="releases" href="https://github.com/stuchain/CuePoint/releases">All releases</a>
  </main>
  <script>
    (function () {
      var winEl = document.getElementById('win-dl');
      var macEl = document.getElementById('mac-dl');
      fetch('https://api.github.com/repos/stuchain/CuePoint/releases/latest')
        .then(function (r) { return r.json(); })
        .then(function (release) {
          if (!release.assets || !release.assets.length) return;
          release.assets.forEach(function (asset) {
            var name = asset.name.toLowerCase();
            if (name.endsWith('.exe')) {
              winEl.href = asset.browser_download_url;
            } else if (name.includes('macos') && name.endsWith('.dmg')) {
              macEl.href = asset.browser_download_url;
            }
          });
        })
        .catch(function () {
          winEl.href = 'https://github.com/stuchain/CuePoint/releases/latest';
          macEl.href = 'https://github.com/stuchain/CuePoint/releases/latest';
        });
    })();
  </script>
</body>
</html>
