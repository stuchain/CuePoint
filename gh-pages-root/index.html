<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CuePoint – Download</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #24292f;
      background: #f6f8fa;
      margin: 0;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    main {
      max-width: 420px;
      width: 100%;
      text-align: center;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 .5rem;
    }
    p {
      margin: 0 0 1.5rem;
      color: #57606a;
    }
    a.download {
      display: inline-block;
      background: #238636;
      color: #fff !important;
      text-decoration: none;
      font-weight: 600;
      padding: .6rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      transition: background .15s;
    }
    a.download:hover {
      background: #2ea043;
    }
    a.releases {
      display: inline-block;
      margin-top: 1rem;
      color: #0969da;
      text-decoration: none;
      font-size: 0.875rem;
    }
    a.releases:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>CuePoint</h1>
    <p>Accurate music metadata for Rekordbox libraries.</p>
    <a class="download" href="https://github.com/stuchain/CuePoint/releases/latest">Download latest release</a>
    <br>
    <a class="releases" href="https://github.com/stuchain/CuePoint/releases">All releases</a>
  </main>
</body>
</html>
