[mypy]
python_version = 3.13
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
strict_optional = True
ignore_missing_imports = False
explicit_package_bases = True
namespace_packages = True

[mypy-PySide6.*]
ignore_missing_imports = True

[mypy-PyQt6.*]
ignore_missing_imports = True

[mypy-rapidfuzz.*]
ignore_missing_imports = True

[mypy-beautifulsoup4.*]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-dateutil.*]
ignore_missing_imports = True

[mypy-ddgs.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True

[mypy-tests.*]
ignore_errors = True

# Root main.py bootstrap and SRC/main.py CLI entry
[mypy-main]
ignore_errors = True

# Performance/benchmark scripts
[mypy-tests.performance.*]
ignore_errors = True

[mypy-tests.run_step510_benchmarks]
ignore_errors = True

# Data providers, matcher service
[mypy-cuepoint.data.providers]
disable_error_code = no-any-return

[mypy-cuepoint.services.matcher_service]
disable_error_code = no-any-return

[mypy-cuepoint.services.checkpoint_service]
disable_error_code = no-any-return

[mypy-cuepoint.services.integrity_service]
disable_error_code = no-any-return

[mypy-cuepoint.update.update_checker]
disable_error_code = no-any-return

[mypy-cuepoint.update.update_preferences]
disable_error_code = no-any-return

[mypy-cuepoint.ui.controllers.main_controller]
disable_error_code = unused-ignore, no-any-return

[mypy-cuepoint.ui.main_window]
disable_error_code = unused-ignore

# Legacy modules use bare imports (config, mix_parser, etc.) - not resolvable
[mypy-cuepoint.legacy.*]
ignore_errors = True

# Qt/PySide6 stubs are incomplete - attr-defined for enum values (AlignCenter, etc.)
[mypy-cuepoint.ui.*]
disable_error_code = attr-defined, method-assign, truthy-function, has-type

[mypy-cuepoint.update.*]
disable_error_code = attr-defined, method-assign, truthy-function, has-type, no-redef, assignment, arg-type, no-any-return, misc, operator, call-overload

# Bootstrap registers concrete implementations for abstract interfaces (intentional)
[mypy-cuepoint.services.bootstrap]
disable_error_code = type-abstract, return-value, arg-type

# Utils with conditional imports / platform-specific code
[mypy-cuepoint.utils.logger]
disable_error_code = misc, no-any-return

[mypy-cuepoint.utils.crash_handler]
disable_error_code = misc, var-annotated, assignment, attr-defined

[mypy-cuepoint.utils.telemetry_helper]
disable_error_code = type-abstract

[mypy-cuepoint.utils.health_check]
disable_error_code = type-abstract

[mypy-cuepoint.ui.widgets.results_view]
disable_error_code = assignment, import-not-found

[mypy-cuepoint.ui.widgets.history_view]
disable_error_code = assignment, arg-type, var-annotated

[mypy-cuepoint.ui.main_window]
disable_error_code = arg-type, assignment, index, operator, name-defined, union-attr, unused-ignore

[mypy-cuepoint.ui.widgets.config_panel]
disable_error_code = arg-type, assignment

[mypy-cuepoint.ui.controllers.main_controller]
disable_error_code = call-overload, call-arg, no-redef, attr-defined, no-any-return

[mypy-cuepoint.ui.widgets.dialogs]
disable_error_code = union-attr, arg-type

[mypy-cuepoint.ui.widgets.shortcut_customization_dialog]
disable_error_code = union-attr

[mypy-cuepoint.ui.widgets.candidate_dialog]
disable_error_code = assignment

[mypy-cuepoint.ui.widgets.batch_processor]
disable_error_code = assignment

[mypy-cuepoint.ui.widgets.shortcut_manager]
disable_error_code = arg-type

[mypy-cuepoint.ui.widgets.changelog_viewer]
disable_error_code = var-annotated

[mypy-cuepoint.ui.widgets.performance_view]
disable_error_code = var-annotated

[mypy-cuepoint.cli.cli_processor]
ignore_missing_imports = True
disable_error_code = call-arg, attr-defined

[mypy-cuepoint.utils.security]
disable_error_code = unused-ignore, no-any-return

[mypy-cuepoint.utils.accessibility]
disable_error_code = return-value, no-any-return

[mypy-cuepoint.ui.widgets.theme]
disable_error_code = return-value

[mypy-cuepoint.utils.system_check]
disable_error_code = arg-type, assignment

[mypy-cuepoint.utils.error_reporting_prefs]
disable_error_code = return-value

[mypy-cuepoint.utils.alerting]
disable_error_code = no-any-return

[mypy-cuepoint.utils.diagnostics]
disable_error_code = assignment, return-value

[mypy-cuepoint.utils.network]
disable_error_code = assignment, return-value, override

[mypy-cuepoint.utils.error_reporter]
disable_error_code = assignment, no-any-return

[mypy-cuepoint.utils.http_cache]
disable_error_code = no-any-return

[mypy-cuepoint.models.config]
disable_error_code = unused-ignore

[mypy-cuepoint.utils.utils]
disable_error_code = unused-ignore

[mypy-cuepoint.core.text_processing]
disable_error_code = operator, return-value

[mypy-cuepoint.core.mix_parser]
disable_error_code = operator, call-overload

[mypy-cuepoint.data.beatport]
disable_error_code = arg-type, misc, assignment, no-any-return

[mypy-cuepoint.data.beatport_search]
disable_error_code = arg-type, var-annotated, assignment

[mypy-cuepoint.core.query_generator]
disable_error_code = arg-type, operator, misc

[mypy-cuepoint.core.matcher]
disable_error_code = no-any-return, call-overload, arg-type, assignment, operator

[mypy-cuepoint.services.output_writer]
disable_error_code = index, attr-defined, var-annotated

[mypy-cuepoint.services.onboarding_service]
disable_error_code = arg-type

[mypy-cuepoint.services.config_service]
disable_error_code = unused-ignore, var-annotated, operator, call-overload

[mypy-cuepoint.services.beatport_service]
disable_error_code = no-any-return, unused-ignore

[mypy-cuepoint.utils.logger_helper]
disable_error_code = unused-ignore

[mypy-cuepoint.services.export_service]
disable_error_code = assignment

[mypy-cuepoint.services.processor_service]
disable_error_code = arg-type, attr-defined, assignment, no-redef

[mypy-cuepoint.services.telemetry_service]
disable_error_code = no-any-return

[mypy-cuepoint.update.update_launcher]
disable_error_code = arg-type

[mypy-cuepoint.update.test_update_system]
disable_error_code = arg-type

[mypy-cuepoint.update.update_downloader]
disable_error_code = misc, assignment

